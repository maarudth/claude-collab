<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    h1 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #16213e;
      margin-bottom: 12px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.connected { background: #22c55e; }
    .dot.disconnected { background: #ef4444; }
    .dot.connecting { background: #f59e0b; animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .label { font-size: 13px; }
    .port-input {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .port-input label { font-size: 12px; color: #888; }
    .port-input input {
      width: 80px;
      padding: 6px 8px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #0e0e1a;
      color: #e0e0e0;
      font-size: 13px;
    }
    button {
      all: unset;
      display: block;
      width: 100%;
      padding: 8px;
      text-align: center;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .btn-connect { background: #6366f1; color: #fff; }
    .btn-connect:hover { background: #4f46e5; }
    .btn-disconnect { background: #333; color: #ccc; }
    .btn-disconnect:hover { background: #444; }
    .btn-toggle { background: #f59e0b; color: #000; }
    .btn-toggle:hover { background: #d97706; }
    .btn-follow { background: #333; color: #ccc; }
    .btn-follow:hover { background: #444; }
    .btn-follow.active { background: #22c55e; color: #000; }
    .btn-follow.active:hover { background: #16a34a; }
    .tabs { font-size: 12px; color: #888; margin-top: 12px; }
    .tabs span { color: #a5b4fc; }
    .error { font-size: 12px; color: #ef4444; margin-top: 8px; display: none; }
  </style>
</head>
<body>
  <h1>Design Collab</h1>

  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span class="label" id="statusLabel">Checking...</span>
  </div>

  <div class="port-input">
    <label>WS Port:</label>
    <input type="number" id="portInput" placeholder="auto" />
  </div>
  <div class="port-input" style="margin-top: 8px;">
    <label>Token:</label>
    <input type="password" id="tokenInput" placeholder="paste auth token" style="width: 160px;" />
  </div>

  <button id="actionBtn" class="btn-connect">Connect</button>
  <button id="toggleBtn" class="btn-toggle" style="display:none">Hide Widget</button>
  <button id="followBtn" class="btn-follow" style="display:none">Follow Tabs: OFF</button>

  <div class="error" id="errorMsg"></div>
  <div class="tabs" id="tabsInfo"></div>

  <script src="popup.js"></script>
</body>
</html>
